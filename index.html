<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>那艺娜 · 点击身体听热歌</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="bg-fire" aria-hidden="true"></div>

  <main class="app">
    <header class="header">
      <p class="eyebrow">NAYINA INTERACTIVE</p>
      <h1 class="title">那艺娜</h1>
      <p class="subtitle">点击身体不同部位，播放 8 首最火单曲</p>
    </header>

    <div class="layout">
      <section class="figure-panel" aria-label="那艺娜全身图互动区">
        <div class="figure-glow" aria-hidden="true"></div>
        <div class="figure-wrap" id="figure-wrap">
          <img
            class="figure-img"
            src="assets/nayina.jpg"
            alt="那艺娜全身照（《贝如塔》宣传图）"
            width="606"
            height="1079"
            draggable="false"
          />
          <div class="figure-overlay" aria-hidden="true"></div>
          <div class="hotspots" id="hotspots" role="group" aria-label="身体部位热区"></div>
        </div>
        <p class="figure-hint">鼠标悬停查看部位 · 点击开始播放</p>
      </section>

      <aside class="player-panel">
        <div class="now-playing">
          <p class="np-label">正在播放</p>
          <h2 class="np-part" id="np-part">—</h2>
          <h3 class="np-title" id="np-title">点击左侧身体开始</h3>
          <p class="np-lyric" id="np-lyric">心在跳是爱情如烈火…</p>
        </div>

        <div class="player-frame-wrap">
          <iframe
            id="player-frame"
            class="player-frame"
            title="音乐播放器"
            allow="autoplay; encrypted-media"
            loading="lazy"
            referrerpolicy="no-referrer-when-downgrade"
          ></iframe>
          <div class="player-placeholder" id="player-placeholder">
            <span class="placeholder-icon">♪</span>
            <p>选择身体部位播放</p>
          </div>
        </div>

        <ol class="track-list" id="track-list" aria-label="热门单曲列表"></ol>
      </aside>
    </div>
  </main>

  <script src="app.js" type="module"></script>
</body>
</html>
